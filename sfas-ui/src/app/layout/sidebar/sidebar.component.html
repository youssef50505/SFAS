<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-mark">
        <i class="ri-funds-box-line"></i>
      </div>
      <span class="logo-text">SFAS</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    @if (role === 'ADMIN') {
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="nav-item">
        <i class="ri-dashboard-3-line nav-icon"></i>
        <span class="nav-text">Dashboard</span>
      </a>
      <a routerLink="/vendors" routerLinkActive="active" class="nav-item">
        <i class="ri-building-2-line nav-icon"></i>
        <span class="nav-text">Vendors</span>
      </a>
      <a routerLink="/bills" routerLinkActive="active" class="nav-item">
        <i class="ri-file-text-line nav-icon"></i>
        <span class="nav-text">Bills</span>
      </a>
      <a routerLink="/collections" routerLinkActive="active" class="nav-item">
        <i class="ri-wallet-3-line nav-icon"></i>
        <span class="nav-text">Collections</span>
      </a>
      <a routerLink="/funds" routerLinkActive="active" class="nav-item">
        <i class="ri-bank-line nav-icon"></i>
        <span class="nav-text">Request Funds</span>
      </a>
      <a routerLink="/reports" routerLinkActive="active" class="nav-item">
        <i class="ri-bar-chart-grouped-line nav-icon"></i>
        <span class="nav-text">Reports</span>
      </a>
    }

    @if (role === 'FINANCE_OFFICER') {
      <a routerLink="/finance/dashboard" routerLinkActive="active" class="nav-item">
        <i class="ri-dashboard-3-line nav-icon"></i>
        <span class="nav-text">Dashboard</span>
      </a>
      <a routerLink="/vendors" routerLinkActive="active" class="nav-item">
        <i class="ri-building-2-line nav-icon"></i>
        <span class="nav-text">Vendors</span>
      </a>
      <a routerLink="/bills" routerLinkActive="active" class="nav-item">
        <i class="ri-file-text-line nav-icon"></i>
        <span class="nav-text">Review Bills</span>
      </a>
      <a routerLink="/funds" routerLinkActive="active" class="nav-item">
        <i class="ri-bank-line nav-icon"></i>
        <span class="nav-text">Review Funds</span>
      </a>
      <a routerLink="/reports" routerLinkActive="active" class="nav-item">
        <i class="ri-bar-chart-grouped-line nav-icon"></i>
        <span class="nav-text">Reports</span>
      </a>
    }
  </nav>

  <div class="sidebar-footer">
    <button class="nav-item nav-item--logout" (click)="logout()">
      <i class="ri-logout-box-r-line nav-icon"></i>
      <span class="nav-text">Sign Out</span>
    </button>
  </div>
</aside>
