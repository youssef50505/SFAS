<div class="urgency-shell">
  <span class="urgency-label">Urgency Level</span>
  <div class="urgency-buttons">
    <button
      type="button"
      *ngFor="let option of options"
      [class.active]="selected === option"
      [class.low]="option === 'Low'"
      [class.normal]="option === 'Normal'"
      [class.high]="option === 'High'"
      [class.critical]="option === 'Critical'"
      (click)="select(option)"
    >
      {{ option }}
    </button>
  </div>
</div>
