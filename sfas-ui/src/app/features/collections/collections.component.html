<div class="page-container">
  <div class="page-header-wrapper" gsapFade [delay]="0" [yOffset]="20">
    <app-page-header title="Collections Dashboard" subtitle="Overview of collected bills amounts across different timeframes">
    </app-page-header>
  </div>

  @if (store.isLoading()) {
    <div class="loading-state" gsapFade [delay]="0.2">
      <div class="spinner"></div>
      <p>Loading collection metrics...</p>
    </div>
  } @else if (store.metrics()) {
    <div class="metrics-grid">
      <app-metric-card
        title="Today's Collections"
        [value]="(store.metrics()!.today | currency) || '0'"
        icon="ri-calendar-event-line"
        trend="Up to date"
        trendType="neutral"
        gsapFade [delay]="0.1" [yOffset]="20"
      ></app-metric-card>

      <app-metric-card
        title="Weekly Collections"
        [value]="(store.metrics()!.weekly | currency) || '0'"
        icon="ri-calendar-line"
        trend="This Week"
        trendType="neutral"
        gsapFade [delay]="0.2" [yOffset]="20"
      ></app-metric-card>

      <app-metric-card
        title="Monthly Collections"
        [value]="(store.metrics()!.monthly | currency) || '0'"
        icon="ri-calendar-2-line"
        trend="This Month"
        trendType="neutral"
        gsapFade [delay]="0.3" [yOffset]="20"
      ></app-metric-card>

      <app-metric-card
        title="Annual Collections"
        [value]="(store.metrics()!.annually | currency) || '0'"
        icon="ri-calendar-check-line"
        trend="This Year"
        trendType="neutral"
        gsapFade [delay]="0.4" [yOffset]="20"
      ></app-metric-card>
    </div>
  }
</div>
