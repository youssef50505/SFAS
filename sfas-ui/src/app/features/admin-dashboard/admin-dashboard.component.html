<div class="dashboard-container">
  <div class="page-header-wrapper" gsapFade [delay]="0" [yOffset]="20">
    <app-page-header title="Admin Dashboard" subtitle="Real-time financial pulse and activity summary"></app-page-header>
  </div>

  @if (store.isLoading()) {
    <div class="loading-state surface">
      <div class="spinner"></div>
      <p>Loading financial data...</p>
    </div>
  } @else {
    <div class="metrics-grid" gsapFade [delay]="0.2">
      <app-metric-card
        label="Total Collections"
        [value]="(store.totalCollections() | currency:'EGP ') || '0'"
        iconClass="ri-money-dollar-circle-line"
        iconColor="var(--accent-success)">
      </app-metric-card>
      <app-metric-card
        label="Pending Bills"
        [value]="store.pendingBillsCount().toString()"
        iconClass="ri-file-list-3-line"
        [iconColor]="store.pendingBillsCount() > 5 ? 'var(--accent-danger)' : 'var(--accent-warning)'"
        [valueClass]="store.pendingBillsCount() > 5 ? 'text-danger' : ''">
      </app-metric-card>
      <app-metric-card
        label="Funds Requires Approval"
        [value]="store.activeFundsCount().toString()"
        iconClass="ri-bank-card-line"
        iconColor="var(--accent-info)">
      </app-metric-card>
    </div>
  
    <div class="chart-container surface" gsapFade [delay]="0.4" [yOffset]="30">
      @if (store.isLoading()) {
        <div class="chart-loading">
          <div class="spinner"></div>
        </div>
      } @else {
        <apx-chart
          [series]="chartOptions.series"
          [chart]="chartOptions.chart"
          [xaxis]="chartOptions.xaxis"
          [stroke]="chartOptions.stroke"
          [tooltip]="chartOptions.tooltip"
          [dataLabels]="chartOptions.dataLabels"
          [title]="chartOptions.title"
          [fill]="chartOptions.fill"
          [colors]="chartOptions.colors"
        ></apx-chart>
      }
    </div>
  }
</div>
