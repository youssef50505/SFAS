<div class="split-layout">
  <div class="branding-panel">
    <div class="branding-content">
      <img src="/logo.jpg" alt="NTG Logo" class="login-logo-image">
      <h1>School Finance Administration System</h1>
      <p class="branding-subtitle">Executive Financial Management & Reporting</p>
      
      <div class="branding-features">
        <div class="feature-item">
          <i class="ri-shield-check-line"></i>
          <span>Secure Role-Based Access</span>
        </div>
        <div class="feature-item">
          <i class="ri-bar-chart-box-line"></i>
          <span>Real-time Financial Analytics</span>
        </div>
        <div class="feature-item">
          <i class="ri-file-list-3-line"></i>
          <span>Automated Compliance Reporting</span>
        </div>
      </div>
    </div>
  </div>

  <div class="form-panel">
    <div class="login-box">
      <div class="login-header">
        <img src="/logo.jpg" alt="NTG Logo" class="login-logo-image-mobile">
        <h2>Welcome Back</h2>
        <p>Please enter your credentials to access the portal</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <app-text-input
          label="Email address"
          id="email"
          type="email"
          formControlName="email"
          placeholder="admin@school.com"
          icon="ri-mail-line">
        </app-text-input>

        <app-text-input
          label="Password"
          id="password"
          [type]="showPassword() ? 'text' : 'password'"
          formControlName="password"
          placeholder="••••••••"
          icon="ri-lock-line"
          [actionIcon]="showPassword() ? 'ri-eye-off-line' : 'ri-eye-line'"
          (action)="togglePassword()">
        </app-text-input>

        <button type="submit" class="btn-primary w-full mt-4" [disabled]="isLoading() || loginForm.invalid">
          @if (isLoading()) {
            <div class="spinner-small"></div> Authenticating...
          } @else {
            Sign In <i class="ri-arrow-right-line" style="margin-left: 0.5rem;"></i>
          }
        </button>
      </form>
    </div>
  </div>
</div>
