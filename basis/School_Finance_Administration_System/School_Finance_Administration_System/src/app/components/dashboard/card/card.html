<div class="card shadow-sm h-100 border-0 ntg-card">
    <div class="card-body d-flex flex-column justify-content-center">
        <p class="card-text text-uppercase fw-bold mb-2 ntg-card-subtitle">
            {{ cardData.title }}
        </p>
        <h5 class="card-title fw-bold mb-0 ntg-card-value">
            {{ cardData.value | currency:'EGP ':'symbol':'1.0-0' }}
        </h5>
    </div>
</div>
