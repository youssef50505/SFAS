<div class="report-card">

  <div class="card-header">
    <div class="header-left">
      <div class="plus">+</div>
      <div>
        <h3>New Report</h3>
        <div class="muted">Please provide detailed information for your report.</div>
      </div>
    </div>
  </div>

  <div class="card-body">
    <label class="field-label">Title of Report</label>
    <input type="text" placeholder="*Your Title..." />

    <label class="field-label">Description of Report</label>
    <textarea rows="5" placeholder="*Describe Your Report..."></textarea>

    <div class="file-drop">
      <app-file-upload></app-file-upload>
    </div>

    <div class="report-type">
      <app-report-type-selector></app-report-type-selector>
      <input type="email" placeholder="e.g. example@ntgclarity.com" />
    </div>

    <div class="buttons">
      <button class="send">
        Send Report
      </button>
    </div>
  </div>

</div>
